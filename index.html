<html lang="en">
<head>

    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
       
        html, body { height:100%; }
        body {
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            margin:0;
            padding:1rem; /* prevent edge clipping */
            box-sizing:border-box;
            background:#fff; /* ensure contrast if external stylesheet sets dark background */
            color:#000; /* ensure text is visible */
            overflow:auto; /* allow scrolling when needed */
        }
        .presentation { text-align:center; max-width:800px; width:100%; }
        .presentation p { margin:0.5rem 0; }
    </style>
</head>
